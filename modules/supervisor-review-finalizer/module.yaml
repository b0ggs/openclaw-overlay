  - The finalizer guard is imported by orchestrator transition gates, render-state, audit loop, and merge helpers.
  - The harness entrypoints are fail-closed placeholders until this module installer restores the moved helpers.
  - Worker-loop review routing prompt assembly remains in the host shell until the shared shell seam is extracted.
