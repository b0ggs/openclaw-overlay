module: prompt-pack
version: 0.1.0
seam_type: workspace-file-template-overlay
source_repo: https://github.com/b0ggs/harness_original
source_commit: aff34e61e8ae04c528ca1d6a25435fda2926761d
depends_on:
  - policy-pack
provides:
  - compact-boot-shell
  - orchestrator-role-contract
  - worker-role-docs
  - reviewer-and-mediator-role-docs
  - boot-index-renderer
fail_closed_when_absent: true
template_placeholders:
  - ${OPENCLAW_HOME}
  - ${OPENCLAW_WORKSPACE_ROOT}
  - ${OPENCLAW_MDS_ROOT}
  - ${OPENCLAW_PROJECTS_ROOT}
  - ${OPENCLAW_EXTERNAL_PROJECTS_ROOT}
  - ${OPENCLAW_WORKTREES_ROOT}
  - ${OPENCLAW_STOP_FILE}
  - ${OPENCLAW_RUNS_ROOT}
notes:
  - Source files under src are copied from harness_original without content edits.
  - Prompt files retain OPENCLAW_* placeholders; the installer can render them for a target workspace.
  - The boot index renderer writes state/boot-index.json in the target workspace.
  - SAM canary files are copied from harness_original with an overlay compatibility shim for current SQLite/Codex auth-store copying; no sourced helper was found.
  - Human-authorized 2026-07-19 portable correction removes temporary hackathon autoload from prompt-pack startup sources; SAM canary keeps the da99c73 overlay auth/plugin repair plus the aff34e61 boot-block verdict fix.
  - Human-authorized 2026-07-20: read-completeness verification added to BOOT.md startup sequence (operator-authorized spec change; evidence: openclaw-mds handoffs/adjudication-1752-canary-20260720T131449Z).
