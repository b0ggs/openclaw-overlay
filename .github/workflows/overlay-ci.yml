name: Overlay CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  overlay-ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Policy-pack tests
        run: |
          set -euo pipefail
          python3 -m unittest discover -s modules/policy-pack/tests -p 'test_*.py'

      - name: Policy-pack install uninstall no-trace smoke
        run: |
          set -euo pipefail
          scratch="$(mktemp -d)"
          mkdir -p "$scratch/workspace"
          printf 'baseline\n' > "$scratch/workspace/baseline.txt"
          (cd "$scratch/workspace" && find . -type f -print -exec sha256sum {} \; | sort) > "$scratch/before.txt"
          bash modules/policy-pack/install.sh "$scratch/workspace"
          bash modules/policy-pack/install.sh "$scratch/workspace"
          bash modules/policy-pack/uninstall.sh "$scratch/workspace"
          (cd "$scratch/workspace" && find . -type f -print -exec sha256sum {} \; | sort) > "$scratch/after.txt"
          diff -u "$scratch/before.txt" "$scratch/after.txt"
