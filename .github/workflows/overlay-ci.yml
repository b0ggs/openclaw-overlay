name: Overlay CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  overlay-ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Python test dependencies
        run: |
          set -euo pipefail
          python3 -m pip install --user tiktoken PyYAML

      - name: Policy-pack tests
        run: |
          set -euo pipefail
          python3 -m unittest discover -s modules/policy-pack/tests -p 'test_*.py'

      - name: Policy-pack install uninstall no-trace smoke
        run: |
          set -euo pipefail
          scratch="$(mktemp -d)"
          mkdir -p "$scratch/workspace"
          printf 'baseline\n' > "$scratch/workspace/baseline.txt"
          (cd "$scratch/workspace" && find . -type f -print -exec sha256sum {} \; | sort) > "$scratch/before.txt"
          bash modules/policy-pack/install.sh "$scratch/workspace"
          bash modules/policy-pack/install.sh "$scratch/workspace"
          bash modules/policy-pack/uninstall.sh "$scratch/workspace"
          (cd "$scratch/workspace" && find . -type f -print -exec sha256sum {} \; | sort) > "$scratch/after.txt"
          diff -u "$scratch/before.txt" "$scratch/after.txt"

      - name: Prompt-pack tests
        run: |
          set -euo pipefail
          python3 -m unittest discover -s modules/prompt-pack/tests -p 'test_*.py'

      - name: Prompt-pack install uninstall no-trace smoke
        run: |
          set -euo pipefail
          scratch="$(mktemp -d)"
          mkdir -p "$scratch/workspace"
          printf 'baseline\n' > "$scratch/workspace/baseline.txt"
          (cd "$scratch/workspace" && find . -type f -print -exec sha256sum {} \; | sort) > "$scratch/before.txt"
          bash modules/prompt-pack/install.sh "$scratch/workspace"
          bash modules/prompt-pack/install.sh "$scratch/workspace"
          bash modules/prompt-pack/uninstall.sh "$scratch/workspace"
          (cd "$scratch/workspace" && find . -type f -print -exec sha256sum {} \; | sort) > "$scratch/after.txt"
          diff -u "$scratch/before.txt" "$scratch/after.txt"

      - name: Heartbeat-progress tests
        run: |
          set -euo pipefail
          python3 -m unittest discover -s modules/heartbeat-progress/tests -p 'test_*.py'

      - name: Heartbeat-progress install uninstall no-trace smoke
        run: |
          set -euo pipefail
          scratch="$(mktemp -d)"
          mkdir -p "$scratch/workspace"
          printf 'baseline\n' > "$scratch/workspace/baseline.txt"
          (cd "$scratch/workspace" && find . -type f -print -exec sha256sum {} \; | sort) > "$scratch/before.txt"
          bash modules/heartbeat-progress/install.sh "$scratch/workspace"
          bash modules/heartbeat-progress/install.sh "$scratch/workspace"
          bash modules/heartbeat-progress/uninstall.sh "$scratch/workspace"
          (cd "$scratch/workspace" && find . -type f -print -exec sha256sum {} \; | sort) > "$scratch/after.txt"
          diff -u "$scratch/before.txt" "$scratch/after.txt"

      - name: List-bound execution gate tests
        run: |
          set -euo pipefail
          python3 -m unittest discover -s modules/list-bound-execution-gate/tests -p 'test_*.py'

      - name: List-bound execution gate install uninstall no-trace smoke
        run: |
          set -euo pipefail
          scratch="$(mktemp -d)"
          mkdir -p "$scratch/workspace/scripts"
          printf 'baseline\n' > "$scratch/workspace/baseline.txt"
          printf '%s\n' \
            'OPENCLAW_HOME="${OPENCLAW_HOME:-$HOME/.openclaw}"' \
            'OPENCLAW_WORKSPACE_ROOT="${OPENCLAW_WORKSPACE_ROOT:-$OPENCLAW_HOME/workspace}"' \
            'OPENCLAW_STOP_FILE="${OPENCLAW_STOP_FILE:-$OPENCLAW_HOME/STOP}"' \
            > "$scratch/workspace/scripts/openclaw-paths.sh"
          (cd "$scratch/workspace" && find . -type f -print -exec sha256sum {} \; | sort) > "$scratch/before.txt"
          bash modules/list-bound-execution-gate/install.sh "$scratch/workspace"
          bash modules/list-bound-execution-gate/install.sh "$scratch/workspace"
          bash modules/list-bound-execution-gate/uninstall.sh "$scratch/workspace"
          (cd "$scratch/workspace" && find . -type f -print -exec sha256sum {} \; | sort) > "$scratch/after.txt"
          diff -u "$scratch/before.txt" "$scratch/after.txt"
